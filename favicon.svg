<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 배경 -->
  <rect width="32" height="32" rx="7" fill="#0f1623"/>

  <!-- 상단 디스플레이 -->
  <rect x="5" y="4" width="22" height="7" rx="2" fill="#00C9B1" opacity="0.18"/>
  <rect x="7" y="6" width="14" height="3" rx="1" fill="#00C9B1" opacity="0.7"/>

  <!-- 버튼 그리드 3×3 -->
  <!-- Row 1 -->
  <rect x="5"  y="14" width="6" height="4" rx="1.5" fill="#00C9B1" opacity="0.55"/>
  <rect x="13" y="14" width="6" height="4" rx="1.5" fill="#00C9B1" opacity="0.55"/>
  <rect x="21" y="14" width="6" height="4" rx="1.5" fill="#00C9B1" opacity="0.9"/>

  <!-- Row 2 -->
  <rect x="5"  y="20" width="6" height="4" rx="1.5" fill="#00C9B1" opacity="0.55"/>
  <rect x="13" y="20" width="6" height="4" rx="1.5" fill="#00C9B1" opacity="0.55"/>
  <rect x="21" y="20" width="6" height="4" rx="1.5" fill="#00C9B1" opacity="0.55"/>

  <!-- Row 3 — 마지막 버튼은 넓게 (= 버튼) -->
  <rect x="5"  y="26" width="6" height="3" rx="1.5" fill="#00C9B1" opacity="0.35"/>
  <rect x="13" y="26" width="6" height="3" rx="1.5" fill="#00C9B1" opacity="0.35"/>
  <rect x="21" y="26" width="6" height="3" rx="1.5" fill="#00C9B1" opacity="0.9"/>
</svg>
